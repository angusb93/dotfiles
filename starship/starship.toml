command_timeout = 1000

format = """
[░▒▓](#5f8787)\
[  ](bg:#5f8787 fg:#000000)\
[](bg:#666666 fg:#5f8787)\
$directory\
[](fg:#666666 bg:#494949)\
$git_branch\
$git_status\
[](fg:#494949 bg:#282828)\
$nodejs\
$rust\
$golang\
$php\
[ ](fg:#282828)\
\n$character"""

[directory]
style = "fg:#fbcb97 bg:#666666"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#494949"
format = '[[ $symbol $branch ](fg:#5f8787 bg:#494949)]($style)'

[git_status]
style = "bg:#494949"
format = '[[($all_status$ahead_behind )](fg:#5f8787 bg:#494949)]($style)'

[nodejs]
symbol = ""
style = "bg:#282828"
format = '[[ $symbol ($version) ](fg:#5f8787 bg:#282828)]($style)'

[rust]
symbol = ""
style = "bg:#282828"
format = '[[ $symbol ($version) ](fg:#5f8787 bg:#282828)]($style)'

[golang]
symbol = ""
style = "bg:#282828"
format = '[[ $symbol ($version) ](fg:#5f8787 bg:#282828)]($style)'

[php]
symbol = ""
style = "bg:#282828"
format = '[[ $symbol ($version) ](fg:#5f8787 bg:#282828)]($style)'

